/* حالت بسته */
.navbar .dropdown-menu {
    display: block;               /* برای کنترل با opacity */
    opacity: 0;
    visibility: hidden;
    transform-origin: top;        /* محور انیمیشن از بالا */
    transform: translateY(-10px); /* کمی بالاتر */
    transition:
        opacity 0.25s ease,
        transform 0.25s ease,
        visibility 0.25s ease;
    background-color: #1f1f1f;    /* مثل عکس: تیره */
    border-radius: 4px;
    padding: 6px 0;
    box-shadow: 0 8px 20px rgba(0,0,0,0.35);
    z-index: 1000;
}

/* وقتی روی "خدمات" می‌روی */
.nav-item.dropdown:hover .dropdown-menu {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);     /* از بالا میاد پایین */
}

/* آیتم‌ها داخل منو */
.navbar .dropdown-item {
    color: #ffffff;
    padding: 10px 18px;
    font-size: 0.9rem;
    white-space: nowrap;
    transition: background-color 0.2s ease, padding-right 0.2s ease;
}

/* خط بین آیتم‌ها */
.navbar .dropdown-item + .dropdown-item {
    border-top: 1px solid #333;
}

/* hover روی آیتم‌ها */
.navbar .dropdown-item:hover {
    background-color: #e6b800;   /* یک رنگ تاکیدی / به دلخواه */
    padding-right: 22px;         /* کمی حرکت برای حس اکشن */
}
